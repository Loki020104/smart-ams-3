<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SmartAMS — Academic Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1117;--ink2:#161b22;--ink3:#21262d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#1f6feb;--blue2:#388bfd;--blue3:#58a6ff;
  --teal:#00b4d8;--teal2:#0096b7;
  --green:#3fb950;--green2:#56d364;
  --orange:#f0883e;--red:#f85149;--red2:#da3633;
  --purple:#8957e5;--yellow:#e3b341;
  --card:rgba(22,27,34,0.92);
  --glass:rgba(33,38,45,0.85);
  --glow-blue:0 0 20px rgba(31,111,235,0.35);
  --glow-teal:0 0 20px rgba(0,180,216,0.35);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --sidebar:260px;
  --transition:0.22s cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--ink);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%,rgba(31,111,235,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%,rgba(0,180,216,0.08) 0%,transparent 60%);
}
/* ---- SCROLLBAR ---- */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--ink2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ---- TYPOGRAPHY ---- */
h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;letter-spacing:-0.02em;line-height:1.2}

/* ===== LOGIN PAGE ===== */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem;position:relative;overflow:hidden;
}
#loginPage::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 60% at 30% 30%,rgba(31,111,235,0.15) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 70% 70%,rgba(0,180,216,0.12) 0%,transparent 70%);
  animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{opacity:.7}100%{opacity:1}}
.login-wrap{
  width:100%;max-width:440px;position:relative;z-index:2;
  animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.login-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:2.5rem;
  backdrop-filter:blur(24px);box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.login-brand{
  text-align:center;margin-bottom:2rem;
}
.login-brand .logo-icon{
  width:56px;height:56px;border-radius:14px;margin:0 auto 1rem;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;box-shadow:var(--glow-blue);
}
.login-brand h1{font-size:1.75rem;font-weight:800;
  background:linear-gradient(135deg,var(--text) 30%,var(--blue3));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-brand p{color:var(--text2);font-size:.9rem;margin-top:.3rem}

.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.75rem}
.role-tab{
  padding:.75rem .5rem;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--ink3);
  cursor:pointer;text-align:center;transition:var(--transition);
}
.role-tab:hover{border-color:var(--blue);background:rgba(31,111,235,.1)}
.role-tab.active{border-color:var(--blue);background:rgba(31,111,235,.18);box-shadow:var(--glow-blue)}
.role-tab .r-icon{font-size:1.5rem;margin-bottom:.3rem}
.role-tab .r-label{font-size:.78rem;font-weight:600;color:var(--text2)}
.role-tab.active .r-label{color:var(--blue3)}

.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:.45rem;letter-spacing:.03em;text-transform:uppercase}
.form-group input{
  width:100%;padding:.8rem 1rem;border-radius:var(--radius-sm);
  background:var(--ink3);border:1.5px solid var(--border);
  color:var(--text);font-size:.95rem;font-family:inherit;
  transition:var(--transition);outline:none;
}
.form-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,111,235,.15)}

.btn-login{
  width:100%;padding:.9rem;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border:none;color:#fff;font-size:1rem;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;
  transition:var(--transition);box-shadow:var(--glow-blue);
  letter-spacing:.02em;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(31,111,235,.4)}
.btn-login:active{transform:translateY(0)}

/* ===== DASHBOARD LAYOUT ===== */
#dashboard{display:flex;min-height:100vh}

/* ---- SIDEBAR ---- */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  overflow-y:auto;overflow-x:hidden;
  transition:transform var(--transition);
  backdrop-filter:blur(20px);
}
.sidebar-brand{
  padding:1.25rem 1.25rem .75rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.75rem;
}
.brand-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.brand-text h2{font-size:.95rem;font-weight:800;line-height:1;
  background:linear-gradient(90deg,var(--text),var(--blue3));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand-text span{font-size:.7rem;color:var(--text3)}

.sidebar-user{
  margin:.75rem;padding:.75rem;border-radius:var(--radius-sm);
  background:var(--ink3);border:1px solid var(--border);
  display:flex;align-items:center;gap:.65rem;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.9rem;
}
.user-meta h4{font-size:.82rem;font-weight:600;line-height:1.2}
.user-meta span{font-size:.7rem;color:var(--text3)}

.nav-section{padding:.75rem .75rem .25rem}
.nav-section-label{
  font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);padding:0 .5rem;margin-bottom:.35rem;
}
.nav-item{
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .75rem;border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);
  margin-bottom:.15rem;position:relative;
}
.nav-item:hover{background:var(--ink3);color:var(--text)}
.nav-item.active{
  background:rgba(31,111,235,.15);color:var(--blue3);
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 3px 3px 0;background:var(--blue);
}
.nav-icon{font-size:1rem;width:1.25rem;text-align:center;flex-shrink:0}
.nav-label{font-size:.82rem;font-weight:500}

.sidebar-footer{
  margin-top:auto;padding:.75rem;border-top:1px solid var(--border);
}
.btn-logout{
  width:100%;padding:.65rem;border-radius:var(--radius-sm);
  background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);
  color:var(--red);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:var(--transition);font-family:inherit;
}
.btn-logout:hover{background:rgba(248,81,73,.22);border-color:var(--red)}

/* ---- TOPBAR ---- */
.main{flex:1;margin-left:var(--sidebar);display:flex;flex-direction:column;min-height:100vh}
.topbar{
  height:58px;flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;position:sticky;top:0;z-index:90;
  backdrop-filter:blur(20px);
}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.menu-toggle{
  display:none;width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--ink3);border:1px solid var(--border);
  cursor:pointer;align-items:center;justify-content:center;font-size:1.1rem;
}
.page-title{font-size:1.15rem;font-weight:700;font-family:'Syne',sans-serif}
.topbar-right{display:flex;align-items:center;gap:.65rem}
.topbar-badge{
  padding:.35rem .75rem;border-radius:20px;font-size:.72rem;font-weight:600;
  background:rgba(31,111,235,.15);color:var(--blue3);
  border:1px solid rgba(31,111,235,.3);
}
.topbar-date{font-size:.78rem;color:var(--text3)}

/* ---- CONTENT ---- */
.content{flex:1;padding:1.5rem;overflow-y:auto}

/* ===== COMPONENT STYLES ===== */
/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;transition:var(--transition);position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;top:0;right:0;width:80px;height:80px;
  border-radius:0 0 0 80px;opacity:.06;
}
.stat-card.blue::after{background:var(--blue)}
.stat-card.teal::after{background:var(--teal)}
.stat-card.green::after{background:var(--green)}
.stat-card.orange::after{background:var(--orange)}
.stat-card.purple::after{background:var(--purple)}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stat-card .s-icon{font-size:1.5rem;margin-bottom:.75rem}
.stat-card .s-val{font-size:1.75rem;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.stat-card .s-lbl{font-size:.75rem;color:var(--text2);margin-top:.35rem;font-weight:500}
.stat-card .s-badge{
  display:inline-flex;align-items:center;gap:.25rem;
  font-size:.7rem;font-weight:600;margin-top:.5rem;padding:.2rem .5rem;border-radius:20px;
}
.s-badge.up{background:rgba(63,185,80,.15);color:var(--green2)}
.s-badge.down{background:rgba(248,81,73,.15);color:var(--red)}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;
  backdrop-filter:blur(10px);
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:.75rem;flex-wrap:wrap}
.card-title{font-size:1rem;font-weight:700;font-family:'Syne',sans-serif}
.card-subtitle{font-size:.78rem;color:var(--text2);margin-top:.2rem}

/* Buttons */
.btn{
  padding:.55rem 1.1rem;border-radius:var(--radius-sm);
  font-size:.82rem;font-weight:600;cursor:pointer;
  border:1px solid transparent;transition:var(--transition);
  font-family:inherit;display:inline-flex;align-items:center;gap:.4rem;
  white-space:nowrap;
}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue2);box-shadow:0 4px 14px rgba(31,111,235,.3)}
.btn-success{background:rgba(63,185,80,.15);color:var(--green2);border-color:rgba(63,185,80,.3)}
.btn-success:hover{background:rgba(63,185,80,.25)}
.btn-danger{background:rgba(248,81,73,.12);color:var(--red);border-color:rgba(248,81,73,.3)}
.btn-danger:hover{background:rgba(248,81,73,.22)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--ink3);border-color:var(--border2)}
.btn-teal{background:rgba(0,180,216,.15);color:var(--teal);border-color:rgba(0,180,216,.3)}
.btn-teal:hover{background:rgba(0,180,216,.25)}
.btn-orange{background:rgba(240,136,62,.12);color:var(--orange);border-color:rgba(240,136,62,.3)}
.btn-orange:hover{background:rgba(240,136,62,.22)}
.btn-sm{padding:.35rem .75rem;font-size:.75rem}
.btn-lg{padding:.8rem 1.5rem;font-size:.95rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Badges */
.badge{
  display:inline-flex;align-items:center;padding:.2rem .6rem;
  border-radius:20px;font-size:.7rem;font-weight:600;
}
.badge-blue{background:rgba(31,111,235,.15);color:var(--blue3)}
.badge-green{background:rgba(63,185,80,.15);color:var(--green2)}
.badge-red{background:rgba(248,81,73,.12);color:var(--red)}
.badge-orange{background:rgba(240,136,62,.12);color:var(--orange)}
.badge-teal{background:rgba(0,180,216,.12);color:var(--teal)}
.badge-purple{background:rgba(137,87,229,.12);color:var(--purple)}
.badge-yellow{background:rgba(227,179,65,.12);color:var(--yellow)}
.badge-gray{background:rgba(139,148,158,.12);color:var(--text2)}

/* Forms */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:.7rem .9rem;border-radius:var(--radius-sm);
  background:var(--ink3);border:1.5px solid var(--border);
  color:var(--text);font-size:.88rem;font-family:inherit;
  transition:var(--transition);outline:none;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,111,235,.12);
}
.form-group textarea{resize:vertical;min-height:90px}
.form-group select option{background:var(--ink2)}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-sm)}
table{width:100%;border-collapse:collapse}
thead tr{background:rgba(30,36,45,.8)}
th{
  padding:.75rem 1rem;text-align:left;font-size:.72rem;
  font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.06em;white-space:nowrap;border-bottom:1px solid var(--border);
}
td{padding:.7rem 1rem;font-size:.85rem;border-bottom:1px solid rgba(48,54,61,.6);vertical-align:middle}
tbody tr:hover{background:rgba(33,38,45,.7)}
tbody tr:last-child td{border-bottom:none}

/* Progress */
.progress-wrap{height:8px;background:var(--ink3);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .6s ease}
.progress-blue .progress-bar{background:linear-gradient(90deg,var(--blue),var(--blue3))}
.progress-green .progress-bar{background:linear-gradient(90deg,var(--green),var(--green2))}
.progress-orange .progress-bar{background:linear-gradient(90deg,var(--orange),#f5a560)}
.progress-red .progress-bar{background:linear-gradient(90deg,var(--red2),var(--red))}

/* Timeline */
.timeline{position:relative;padding-left:1.5rem}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--border);border-radius:1px}
.tl-item{position:relative;padding-bottom:1.25rem}
.tl-item::before{content:'';position:absolute;left:-1.85rem;top:.3rem;width:10px;height:10px;border-radius:50%;border:2px solid var(--blue);background:var(--ink2)}
.tl-item.done::before{background:var(--blue)}
.tl-date{font-size:.72rem;color:var(--text3);margin-bottom:.2rem}
.tl-title{font-size:.88rem;font-weight:600}
.tl-sub{font-size:.78rem;color:var(--text2);margin-top:.2rem}

/* Tabs */
.tabs{display:flex;gap:.25rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:.65rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition);white-space:nowrap;color:var(--text2)}
.tab.active{color:var(--blue3);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text);border-bottom-color:var(--border)}

/* Modals */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  backdrop-filter:blur(4px);animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--ink2);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:1.75rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;
  animation:slideUp .25s cubic-bezier(.16,1,.3,1);
}
.modal-lg{max-width:760px}
.modal-sm{max-width:400px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.modal-title{font-size:1.1rem;font-weight:700;font-family:'Syne',sans-serif}
.modal-close{
  width:32px;height:32px;border-radius:var(--radius-sm);background:var(--ink3);
  border:1px solid var(--border);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:var(--transition);
}
.modal-close:hover{background:rgba(248,81,73,.15);color:var(--red);border-color:rgba(248,81,73,.3)}

/* Camera */
.camera-wrap{
  position:relative;background:#000;border-radius:var(--radius);
  overflow:hidden;width:100%;aspect-ratio:4/3;margin-bottom:1rem;
}
.camera-wrap video,.camera-wrap canvas,.camera-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.camera-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:60%;aspect-ratio:1;border:3px solid rgba(31,111,235,.7);
  border-radius:50%;pointer-events:none;
  box-shadow:0 0 0 1px rgba(31,111,235,.3),inset 0 0 0 1px rgba(31,111,235,.2);
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(31,111,235,.4),inset 0 0 0 1px rgba(31,111,235,.2)}
  50%{box-shadow:0 0 0 12px rgba(31,111,235,0),inset 0 0 0 1px rgba(31,111,235,.2)}
}
.camera-status{
  position:absolute;bottom:.75rem;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);color:#fff;font-size:.78rem;font-weight:600;
  padding:.35rem .9rem;border-radius:20px;white-space:nowrap;
}

/* QR Code */
.qr-container{
  background:white;padding:1rem;border-radius:var(--radius);
  display:inline-block;
}

/* Notification */
.notif{
  position:fixed;top:1rem;right:1rem;z-index:2000;
  padding:.85rem 1.25rem;border-radius:var(--radius-sm);
  font-size:.85rem;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation:slideInRight .3s cubic-bezier(.16,1,.3,1);
  display:flex;align-items:center;gap:.65rem;max-width:340px;
  border:1px solid transparent;
}
@keyframes slideInRight{from{transform:translateX(120%)}to{transform:translateX(0)}}
.notif-success{background:rgba(63,185,80,.15);border-color:rgba(63,185,80,.3);color:var(--green2)}
.notif-error{background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.3);color:var(--red)}
.notif-info{background:rgba(31,111,235,.15);border-color:rgba(31,111,235,.3);color:var(--blue3)}
.notif-warning{background:rgba(240,136,62,.15);border-color:rgba(240,136,62,.3);color:var(--orange)}

/* Attendance status */
.att-status{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;gap:1rem;
}
.att-icon-wrap{
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:2.5rem;
  margin-bottom:.5rem;
}
.att-icon-wrap.success{background:rgba(63,185,80,.15);border:2px solid rgba(63,185,80,.3)}
.att-icon-wrap.error{background:rgba(248,81,73,.12);border:2px solid rgba(248,81,73,.3)}
.att-icon-wrap.loading{background:rgba(31,111,235,.12);border:2px solid rgba(31,111,235,.3);animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Charts bar */
.bar-chart{display:flex;flex-direction:column;gap:.6rem}
.bar-row{display:flex;align-items:center;gap:.75rem}
.bar-label{font-size:.78rem;color:var(--text2);width:90px;flex-shrink:0;text-align:right}
.bar-fill{flex:1;height:10px;background:var(--ink3);border-radius:5px;overflow:hidden}
.bar-inner{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.bar-val{font-size:.78rem;font-weight:600;width:40px;flex-shrink:0}

/* Announcement */
.announcement{
  padding:1rem;border-radius:var(--radius-sm);border-left:3px solid;
  background:var(--ink3);margin-bottom:.75rem;
}
.announcement.info{border-color:var(--blue)}
.announcement.warning{border-color:var(--orange)}
.announcement.urgent{border-color:var(--red)}
.announcement.success{border-color:var(--green)}
.ann-title{font-size:.88rem;font-weight:600;margin-bottom:.25rem}
.ann-meta{font-size:.72rem;color:var(--text3)}

/* Search */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap input{padding:.55rem .9rem .55rem 2.2rem;background:var(--ink3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.82rem;outline:none;min-width:200px;transition:var(--transition)}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:.7rem;font-size:.85rem;color:var(--text3)}

/* Empty state */
.empty{text-align:center;padding:3rem 1rem}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.5}
.empty-text{color:var(--text2);font-size:.9rem}

/* ===== MOBILE ===== */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}

@media(max-width:768px){
  :root{--sidebar:260px}
  .main{margin-left:0}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .menu-toggle{display:flex}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .content{padding:1rem}
  .topbar{padding:0 1rem}
  .modal{padding:1.25rem}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .role-tabs{grid-template-columns:repeat(3,1fr)}
  .form-row{grid-template-columns:1fr}
  .card-header{flex-direction:column;align-items:flex-start}
}

/* Loading overlay */
.page-loader{
  position:fixed;inset:0;background:var(--ink);z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;
}
.loader-ring{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;
}
.loader-text{font-size:.85rem;color:var(--text2);font-weight:500}

/* Utils */
.text-sm{font-size:.8rem}.text-xs{font-size:.72rem}
.text-muted{color:var(--text2)}.text-dim{color:var(--text3)}
.text-blue{color:var(--blue3)}.text-green{color:var(--green2)}
.text-red{color:var(--red)}.text-orange{color:var(--orange)}
.text-teal{color:var(--teal)}.text-purple{color:var(--purple)}
.fw-bold{font-weight:700}.fw-semibold{font-weight:600}
.d-flex{display:flex}.align-center{align-items:center}.justify-between{justify-content:space-between}
.gap-sm{gap:.5rem}.gap-md{gap:.75rem}.gap-lg{gap:1rem}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mt-lg{margin-top:1.5rem}
.mb-sm{margin-bottom:.5rem}.mb-md{margin-bottom:1rem}.mb-lg{margin-bottom:1.5rem}
.w-full{width:100%}
.chip{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .65rem;border-radius:20px;font-size:.72rem;font-weight:600;background:var(--ink3);border:1px solid var(--border)}
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading SmartAMS…</div>
</div>

<!-- QR ATTENDANCE PAGE -->
<div id="qrAttendancePage" style="display:none !important;min-height:100vh;background:var(--ink);color:var(--text);padding:1rem;flex-direction:column;align-items:center;justify-content:center;position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000">
  <div style="max-width:500px;width:100%;margin:0 auto">
    <div class="card">
      <div class="card-header"><div class="card-title">🎓 QR Attendance Verification</div></div>
      <div id="qrAttContent" style="padding:1rem">Loading attendance form...</div>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPage" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-icon">🎓</div>
        <h1>SmartAMS</h1>
        <p>Academic Management System</p>
      </div>
      
      <!-- LOGIN FORM -->
        <div class="role-tabs">
          <div class="role-tab active" data-role="student" onclick="selectRole(this)">
            <div class="r-icon">👨‍🎓</div>
            <div class="r-label">Student</div>
          </div>
          <div class="role-tab" data-role="faculty" onclick="selectRole(this)">
            <div class="r-icon">👩‍🏫</div>
            <div class="r-label">Faculty</div>
          </div>
          <div class="role-tab" data-role="admin" onclick="selectRole(this)">
            <div class="r-icon">🛡️</div>
            <div class="r-label">Admin</div>
          </div>
        </div>
        <div class="form-group">
          <label>Username / ID</label>
          <input id="loginUser" type="text" placeholder="Enter your ID" value=""/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPass" type="password" placeholder="Enter password" value=""/>
        </div>
        <button class="btn-login" onclick="doLogin()">Sign In →</button>
        <p style="margin-top:1rem;font-size:.75rem;color:var(--text3);text-align:center">Enter your credentials to log in</p>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <div class="brand-text"><h2>SmartAMS</h2><span id="sbRoleBadge">Student Portal</span></div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sbAvatar">S</div>
      <div class="user-meta"><h4 id="sbName">User</h4><span id="sbId">ID: -</span></div>
    </div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="doLogout()">⏻ Sign Out</button></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="page-title" id="pageTitle">Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-badge" id="topbarRole">Student</div>
        <div class="topbar-date" id="topbarDate"></div>
        <button class="btn btn-outline btn-sm" onclick="showNotifications()">🔔</button>
      </div>
    </header>
    <div class="content" id="mainContent"></div>
  </main>
</div>

<div id="notifContainer"></div>

<script src="qr_client.js"></script>
<script src="app.js"></script>
</body>
</html>
